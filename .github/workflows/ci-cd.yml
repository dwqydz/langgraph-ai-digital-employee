name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 3379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements_llm.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_llm.txt
          pip install pytest pytest-asyncio pytest-cov pytest-json-report aiosqlite aiomysql

      - name: Run tests
        env:
          DATABASE_URL: mysql+aiomysql://root:root_password@localhost:3306/test_db
          REDIS_URL: redis://localhost:3379/0
        run: |
          cd parttest
          python -m pytest 01_auth_tests/ 02_todo_tests/ 03_meeting_tests/ 07_security_tests/ \
            --json-report --json-report-file=test_results.json \
            --cov=. --cov-report=xml \
            -v

      - uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: backend-test-results
          path: parttest/test_results.json

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: parttest/coverage.xml
          fail_ci_if_error: false

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: forward/-AI-Digital-Worker-development-project
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@v5.0.1
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: forward/-AI-Digital-Worker-development-project/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint || echo "skip lint"

      - name: Build
        run: npm run build --if-present

      - uses: actions/upload-artifact@v4.4.0
        with:
          name: frontend-build
          path: forward/-AI-Digital-Worker-development-project/dist

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-digital-staff-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-digital-staff-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: forward/-AI-Digital-Worker-development-project
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-digital-staff-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-digital-staff-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /opt/ai-digital-staff
            docker-compose pull
            docker-compose up -d
            docker system prune -af