name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 提前测试 Node.js 24 兼容性（2026年6月后会自动启用）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 统一环境变量，便于维护
  BACKEND_TEST_DIR: parttest
  FRONTEND_DIR: forward/AI-Digital-Worker-development-project
  DOCKER_BACKEND_IMAGE: ai-digital-staff-backend
  DOCKER_FRONTEND_IMAGE: ai-digital-staff-frontend

jobs:
  # 后端测试
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Backend Test & Coverage
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements_llm.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_llm.txt
          pip install pytest pytest-asyncio pytest-cov pytest-json-report aiosqlite aiomysql

      - name: Run backend tests
        env:
          DATABASE_URL: mysql+aiomysql://root:root_password@localhost:3306/test_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd ${{ env.BACKEND_TEST_DIR }}
          python -m pytest 01_auth_tests/ 02_todo_tests/ 03_meeting_tests/ 07_security_tests/ \
            --json-report --json-report-file=test_results.json \
            --cov=. --cov-report=xml \
            -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: ${{ env.BACKEND_TEST_DIR }}/test_results.json
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.BACKEND_TEST_DIR }}/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # 前端测试
  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Frontend Lint & Build
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run linter
        run: |
          if [ -f package.json ] && grep -q "lint" package.json; then
            npm run lint
          else
            echo "No lint script configured, skipping..."
          fi

      - name: Build frontend
        run: npm run build --if-present
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_DIR }}/dist/
          retention-days: 7

  # Docker构建和推送
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Build & Push Docker Images
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false

  # 部署到服务器
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Deploy to Production Server
    environment:
      name: production
      url: ${{ secrets.SERVER_PUBLIC_URL }}
    
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 120s
          script: |
            set -e  # 出错立即停止
            cd /opt/ai-digital-staff
            
            # 拉取最新镜像
            docker-compose pull
            
            # 重启服务
            docker-compose up -d
            
            # 清理无用资源
            docker system prune -af
            
            # 输出部署日志
            echo "Deployment completed successfully at $(date)"
            docker-compose ps